<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>e-Rise Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --coral:#FF4400; --coral-soft:#FFDDD0;
    --orange:#FF9C3D; --orange-soft:#FFE7C9;
    --yellow:#F5DE4C; --yellow-soft:#FBF3C7;
    --mint:#8FE3A6; --mint-soft:#DFF7E6;
    --green:#2FA968; --ink:#22190F; --line:#171310; --bg:#FFF7E8; --panel:#FFFFFF;
    --font-display:'Baloo 2',sans-serif; --font-body:'Nunito',sans-serif;
    --font-jp:'Noto Sans JP',sans-serif; --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:radial-gradient(circle at 8% 10%, var(--yellow-soft) 0, transparent 40%),radial-gradient(circle at 95% 15%, var(--mint-soft) 0, transparent 45%),var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
  .jp{font-family:var(--font-jp);font-weight:600;color:#5a4d3a;font-size:0.82em;display:inline-block;margin-top:2px;}
  #app{max-width:1180px;margin:0 auto;padding:0 20px 60px;}
  .panel{background:var(--panel);border:3px solid var(--line);border-radius:22px;box-shadow:6px 6px 0 var(--line);padding:20px;}
  header.top{display:flex;align-items:center;justify-content:space-between;padding:22px 4px 16px;flex-wrap:wrap;gap:14px;}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand img{height:58px;width:auto;flex:none;}
  .brand h1{font-family:var(--font-display);font-weight:800;font-size:30px;margin:0;background:linear-gradient(90deg,var(--coral) 0%, var(--orange) 40%, var(--yellow) 70%, var(--mint) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:.01em;}
  .brand .sub{font-family:var(--font-body);font-weight:800;font-size:13px;color:var(--coral);margin-top:2px;}
  .header-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .lang-toggle{display:flex;background:var(--panel);border:3px solid var(--line);border-radius:999px;padding:4px;gap:4px;box-shadow:4px 4px 0 var(--line);}
  .lang-toggle button{border:none;background:none;padding:8px 16px;border-radius:999px;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--ink);}
  .lang-toggle button.active{background:linear-gradient(90deg,var(--coral),var(--orange));color:#fff;}
  .sound-toggle{width:44px;height:44px;border-radius:999px;border:3px solid var(--line);background:var(--panel);box-shadow:4px 4px 0 var(--line);cursor:pointer;font-size:18px;}
  nav.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;}
  nav.tabs button{font-family:var(--font-display);font-weight:700;font-size:14px;padding:10px 18px;border-radius:14px;border:3px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer;box-shadow:3px 3px 0 var(--line);transition:transform .1s;}
  nav.tabs button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--line);}
  nav.tabs button.active{background:linear-gradient(135deg,var(--coral),var(--orange));color:#fff;}
  .tab{display:none;animation:fadein .25s ease;}
  .tab.active{display:block;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  h2.section-title{font-family:var(--font-display);font-weight:800;font-size:24px;color:var(--coral);margin:0 0 2px;}
  p.section-sub{color:#6b5f4a;margin:0 0 20px;font-weight:700;font-size:14px;}
  .grid2{display:grid;grid-template-columns:1.05fr 1fr;gap:20px;}
  @media(max-width:820px){.grid2{grid-template-columns:1fr;}}

  .home-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:10px;}
  .home-card{background:var(--panel);border:3px solid var(--line);border-radius:22px;box-shadow:6px 6px 0 var(--line);padding:26px 18px;text-align:center;cursor:pointer;transition:transform .12s;}
  .home-card:active{transform:translate(3px,3px);box-shadow:2px 2px 0 var(--line);}
  .home-card .emoji{font-size:44px;display:block;margin-bottom:10px;}
  .home-card .title{font-family:var(--font-display);font-weight:800;font-size:18px;color:var(--coral);}
  .home-card .desc{font-size:12.5px;color:#6b5f4a;font-weight:700;margin-top:4px;}
  .back-btn{background:var(--panel);border:2.5px solid var(--line);color:var(--ink);padding:8px 16px;border-radius:12px;cursor:pointer;font-size:13px;font-family:var(--font-display);font-weight:700;margin-bottom:14px;}

  #reader,#reader-mybooks,#reader-review{width:100%;border-radius:16px;overflow:hidden;background:#000;min-height:260px;border:4px dashed var(--orange);}
  .scan-hint{font-family:var(--font-mono);font-size:12px;color:#7a6c50;margin-top:10px;text-align:center;font-weight:600;}
  .manual-toggle{background:none;border:none;color:var(--coral);text-decoration:underline;cursor:pointer;font-size:13px;font-family:var(--font-body);font-weight:700;margin-top:12px;}
  .manual-entry{display:none;gap:8px;margin-top:12px;}
  .manual-entry.show{display:flex;}
  .manual-entry input{flex:1;padding:10px 12px;border-radius:10px;border:2.5px solid var(--line);font-family:var(--font-mono);}
  .manual-entry button{padding:10px 16px;border-radius:10px;border:2.5px solid var(--line);background:var(--mint);color:var(--ink);font-weight:800;cursor:pointer;font-family:var(--font-display);}
  .status-panel{display:flex;flex-direction:column;gap:14px;min-height:260px;}
  .status-step{font-family:var(--font-display);font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--orange);font-weight:800;}
  .status-msg{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--ink);line-height:1.35;}
  .player-chip{display:flex;align-items:center;gap:12px;background:var(--yellow-soft);border:3px solid var(--line);border-radius:16px;padding:12px 14px;}
  .hexbadge{width:46px;height:46px;flex:none;clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:20px;overflow:hidden;}
  .hexbadge img{width:100%;height:100%;object-fit:cover;}
  .xp-bar{display:flex;gap:4px;margin-top:6px;}
  .xp-seg{flex:1;height:8px;border-radius:4px;background:#eee2c4;border:1.5px solid var(--line);}
  .xp-seg.fill{background:var(--green);}
  .quest-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px;}
  .quest-list li{font-size:13px;font-weight:700;padding:9px 12px;background:var(--bg);border:2px solid var(--line);border-radius:10px;display:flex;justify-content:space-between;gap:8px;}
  .quest-list .due-tag{font-family:var(--font-mono);font-size:11px;color:#7a6c50;white-space:nowrap;font-weight:500;}
  .cancel-btn{align-self:flex-start;background:var(--panel);border:2.5px solid var(--line);color:var(--ink);padding:8px 16px;border-radius:12px;cursor:pointer;font-size:13px;font-family:var(--font-display);font-weight:700;}
  .stamp-zone{min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;gap:12px;}
  .stamp{font-family:var(--font-display);font-weight:800;font-size:22px;border:4px solid; padding:14px 22px;border-radius:16px;transform:rotate(-5deg);letter-spacing:.02em;text-align:center;animation:stampIn .4s cubic-bezier(.2,1.5,.4,1);background:#fff;}
  .stamp.ok{color:var(--green);border-color:var(--green);}
  .stamp.warn{color:var(--coral);border-color:var(--coral);animation:stampIn .4s cubic-bezier(.2,1.5,.4,1), shake .5s .4s;}
  .stamp small{display:block;font-family:var(--font-body);font-weight:700;font-size:12px;margin-top:6px;color:var(--ink);}
  @keyframes stampIn{from{transform:scale(2.2) rotate(-5deg);opacity:0;}to{transform:scale(1) rotate(-5deg);opacity:1;}}
  @keyframes shake{0%,100%{transform:rotate(-5deg) translateX(0);}25%{transform:rotate(-5deg) translateX(-4px);}75%{transform:rotate(-5deg) translateX(4px);}}
  .confetti{position:absolute;font-size:18px;animation:confettiFall 1.1s ease-in forwards;pointer-events:none;}
  @keyframes confettiFall{from{transform:translateY(-20px) rotate(0deg);opacity:1;}to{transform:translateY(90px) rotate(300deg);opacity:0;}}

  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
  .chip{font-family:var(--font-display);font-weight:700;font-size:13px;padding:8px 16px;border-radius:999px;border:2.5px solid var(--line);background:var(--panel);cursor:pointer;}
  .chip.active{background:linear-gradient(90deg,var(--coral),var(--orange));color:#fff;}
  .book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
  .book-card{border:2.5px solid var(--line);border-radius:16px;padding:14px;background:var(--panel);}
  .book-card .bt{font-family:var(--font-display);font-weight:700;font-size:14.5px;color:var(--coral);}
  .book-card .ba{font-size:12px;color:#6b5f4a;font-weight:700;margin:2px 0 8px;}

  .form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .form-row input,.form-row select,.form-row textarea{flex:1;min-width:140px;padding:11px 13px;border-radius:12px;border:2.5px solid var(--line);font-family:var(--font-body);font-weight:600;font-size:14px;background:var(--panel);}
  .btn{padding:11px 20px;border-radius:14px;border:2.5px solid var(--line);background:linear-gradient(135deg,var(--coral),var(--orange));color:#fff;font-weight:800;cursor:pointer;font-size:14px;font-family:var(--font-display);box-shadow:3px 3px 0 var(--line);transition:transform .1s;}
  .btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--line);}
  .btn.secondary{background:var(--mint);color:var(--ink);}
  .btn.danger{background:var(--coral);}
  .btn.small{padding:6px 12px;font-size:12px;box-shadow:2px 2px 0 var(--line);}
  .btn.toggle-off{background:#eee;color:#888;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-family:var(--font-display);font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#8a7a5c;padding:9px 10px;border-bottom:3px solid var(--line);}
  td{padding:11px 10px;border-bottom:2px solid var(--yellow-soft);vertical-align:middle;font-weight:600;}
  tr.clickable{cursor:pointer;}
  tr.clickable:hover td{background:var(--yellow-soft);}
  tr:last-child td{border-bottom:none;}
  .qr-thumb{width:42px;height:42px;background:#fff;border:2px solid var(--line);border-radius:8px;}
  .avatar-thumb{width:42px;height:42px;border-radius:10px;border:2px solid var(--line);object-fit:cover;background:#fff;}
  .badge{font-family:var(--font-display);font-size:11px;padding:5px 11px;border-radius:999px;font-weight:700;display:inline-block;}
  .badge.available{background:var(--mint-soft);color:var(--green);}
  .badge.out{background:var(--orange-soft);color:#b5620f;}
  .badge.overdue{background:var(--coral-soft);color:var(--coral);}
  .badge.returned{background:#eee;color:#888;}
  .level-badge{display:inline-flex;align-items:center;justify-content:center;padding:4px 10px;border-radius:999px;color:#fff;font-family:var(--font-display);font-weight:800;font-size:11px;}
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  @media(max-width:700px){.stat-row{grid-template-columns:repeat(2,1fr);}}
  .stat{background:var(--panel);border:3px solid var(--line);border-radius:16px;padding:14px 16px;box-shadow:4px 4px 0 var(--line);}
  .stat .num{font-family:var(--font-display);font-weight:800;font-size:28px;color:var(--coral);}
  .stat .lbl{font-family:var(--font-display);font-size:11px;color:#8a7a5c;text-transform:uppercase;letter-spacing:.04em;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
  .report-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px;}
  @media(max-width:700px){.report-cols{grid-template-columns:1fr;}}
  .report-list{list-style:none;margin:0;padding:0;}
  .report-list li{display:flex;justify-content:space-between;padding:9px 0;border-bottom:2px solid var(--yellow-soft);font-weight:700;font-size:13.5px;}
  .report-list li:last-child{border-bottom:none;}

  .modal-overlay{position:fixed;inset:0;background:rgba(34,25,15,.6);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal-overlay.hidden{display:none;}
  .modal-box{background:var(--panel);border:4px solid var(--line);border-radius:20px;padding:28px;width:280px;text-align:center;box-shadow:6px 6px 0 var(--line);}
  .modal-box h3{font-family:var(--font-display);color:var(--coral);margin:0 0 14px;}
  .modal-box input{width:100%;padding:12px;font-size:20px;text-align:center;letter-spacing:.3em;border-radius:10px;border:2.5px solid var(--line);font-family:var(--font-mono);margin-bottom:12px;}
  .modal-box .err{color:var(--coral);font-size:12px;font-weight:700;height:16px;margin-bottom:8px;}

  .detail-modal{background:var(--panel);border:4px solid var(--line);border-radius:22px;padding:26px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:8px 8px 0 var(--line);text-align:left;}
  .detail-modal h3{font-family:var(--font-display);color:var(--coral);font-size:22px;margin:0 0 14px;}
  .detail-modal label{display:block;font-family:var(--font-display);font-size:12px;color:#8a7a5c;margin-bottom:4px;margin-top:12px;}
  .detail-modal input,.detail-modal textarea{width:100%;padding:10px;border-radius:10px;border:2.5px solid var(--line);font-family:var(--font-body);font-size:14px;}
  .detail-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
  .photo-upload{display:flex;align-items:center;gap:14px;margin-top:8px;}
  .photo-upload .preview{width:80px;height:80px;border-radius:16px;border:3px solid var(--line);object-fit:cover;background:var(--yellow-soft);}
  .qr-display{display:flex;align-items:center;gap:12px;background:var(--yellow-soft);border:2px solid var(--line);border-radius:14px;padding:10px 14px;margin-top:10px;}
  .qr-display .code{font-family:var(--font-mono);font-weight:700;}

  .star-row{display:flex;gap:6px;font-size:30px;justify-content:center;margin:10px 0;}
  .star{cursor:pointer;filter:grayscale(1) opacity(.4);transition:.1s;}
  .star.active{filter:none;}
  .review-item{border-bottom:2px solid var(--yellow-soft);padding:10px 0;}
  .review-item:last-child{border-bottom:none;}
  .review-stars{color:var(--orange);font-size:14px;}
  .avg-rating{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-display);font-weight:800;color:var(--orange);font-size:16px;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:14px;font-size:13.5px;font-weight:700;z-index:100;animation:fadein .2s;border:2.5px solid var(--line);max-width:90vw;text-align:center;}
  .toast.error{background:var(--coral);}
  .qr-print-card{border:3px dashed var(--line);border-radius:14px;padding:14px;text-align:center;background:#fff;}
  .qr-print-card .title{font-family:var(--font-display);font-weight:700;font-size:13px;margin:8px 0 2px;color:var(--coral);}
  .qr-print-card .meta{font-family:var(--font-mono);font-size:10.5px;color:#7a6c50;}
  #print-view{display:none;}
  #print-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  #print-profile{display:none;}
  @media print{#app{display:none;} #print-view.show{display:block;} #print-profile.show{display:block;}}
  .hidden{display:none !important;}
  .muted{color:#8a7a5c;font-size:13px;font-weight:700;}
  .toggle-switch{display:inline-flex;align-items:center;gap:10px;}

  .lock-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--coral),var(--orange));display:flex;align-items:center;justify-content:center;z-index:200;}
  .lock-overlay.hidden{display:none;}
  .lock-box{background:#fff;border:4px solid var(--line);border-radius:24px;padding:34px;width:300px;text-align:center;box-shadow:8px 8px 0 var(--line);}
  .lock-box img{height:60px;margin-bottom:10px;}
  .lock-box h2{font-family:var(--font-display);color:var(--coral);margin:0 0 6px;}
  .lock-box input{width:100%;padding:14px;font-size:24px;text-align:center;letter-spacing:.3em;border-radius:12px;border:2.5px solid var(--line);font-family:var(--font-mono);margin:14px 0 10px;}

  /* ---- mobile: fit scan screen without scrolling ---- */
  .card-confirm{display:flex;flex-direction:column;align-items:center;gap:8px;animation:stampIn .4s cubic-bezier(.2,1.5,.4,1);}
  .card-confirm-avatar{position:relative;width:84px;height:84px;border-radius:50%;background:linear-gradient(160deg,var(--mint),var(--green));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:28px;overflow:hidden;border:4px solid var(--line);}
  .card-confirm-avatar img{width:100%;height:100%;object-fit:cover;}
  .check-badge{position:absolute;bottom:-4px;right:-4px;width:30px;height:30px;background:var(--green);color:#fff;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;}
  .card-confirm-name{font-family:var(--font-display);font-weight:800;color:var(--coral);font-size:16px;}

  @media (max-width: 640px){
    #app{padding:0 10px 20px;}
    header.top{padding:8px 2px 6px;gap:8px;}
    .brand{gap:8px;}
    .brand img{height:32px;}
    .brand h1{font-size:18px;}
    .brand .sub{font-size:9.5px;}
    .header-controls{gap:6px;}
    .sound-toggle{width:34px;height:34px;font-size:14px;box-shadow:2px 2px 0 var(--line);}
    .lang-toggle{padding:2px;box-shadow:2px 2px 0 var(--line);}
    .lang-toggle button{padding:5px 9px;font-size:10.5px;}
    nav.tabs{margin-bottom:8px;gap:4px;}
    nav.tabs button{padding:6px 10px;font-size:11.5px;border-radius:10px;box-shadow:2px 2px 0 var(--line);}
    .home-cards{gap:8px;}
    .home-card{padding:14px 8px;border-radius:16px;box-shadow:3px 3px 0 var(--line);}
    .home-card .emoji{font-size:28px;margin-bottom:2px;}
    .home-card .title{font-size:12.5px;}
    .home-card .desc{font-size:9.5px;margin-top:2px;}
    .back-btn{padding:6px 12px;font-size:11.5px;margin-bottom:8px;}
    h2.section-title{font-size:16px;}
    p.section-sub{font-size:11px;margin-bottom:8px;}
    .panel{padding:10px;border-radius:14px;box-shadow:3px 3px 0 var(--line);}
    .grid2{gap:8px;}
    #reader,#reader-mybooks,#reader-review{min-height:180px;border-radius:12px;}
    .scan-hint{font-size:10.5px;margin-top:6px;}
    .manual-toggle{font-size:11px;margin-top:6px;}
    .status-panel{min-height:auto;gap:8px;}
    .status-step{font-size:11px;}
    .status-msg{font-size:14.5px;}
    .player-chip{padding:8px 10px;gap:8px;}
    .hexbadge{width:36px;height:36px;font-size:14px;}
    .xp-bar{margin-top:4px;}
    .quest-list li{padding:6px 9px;font-size:11.5px;}
    .stamp-zone{min-height:70px;}
    .stamp{font-size:15px;padding:8px 12px;border-radius:12px;}
    .stamp small{font-size:10.5px;}
    .card-confirm-avatar{width:64px;height:64px;font-size:22px;}
    .check-badge{width:24px;height:24px;font-size:13px;}
    .card-confirm-name{font-size:13.5px;}
    .cancel-btn{padding:6px 12px;font-size:11px;}
  }
</style>
</head>
<body>

<!-- DAILY LOCK -->

  soundEnabled = !soundEnabled;
  localStorage.setItem('erise:sound', soundEnabled ? 'on' : 'off');

});
function speak(key, queue){
  if(!soundEnabled || !window.speechSynthesis) return;
  const v = VOICE[key];
  if(!v) return;
  if(!queue) window.speechSynthesis.cancel();
  const uEn = new SpeechSynthesisUtterance(v.en);
  uEn.lang = 'en-US'; uEn.rate = 1;
  window.speechSynthesis.speak(uEn);
  if(settings.language==='bilingual'){
    const uJp = new SpeechSynthesisUtterance(v.jp);
    uJp.lang = 'ja-JP'; uJp.rate = 1;
    window.speechSynthesis.speak(uJp);
  }
}

  try{

function tierOf(n){
  if(n>=100) return {name:'Diamond',emoji:'💎',c1:'#8ec9ff',c2:'#2e6fc9',next:null};
  if(n>=50) return {name:'Gold',emoji:'🥇',c1:'#ffe08a',c2:'#d99a1f',next:100};
  if(n>=25) return {name:'Silver',emoji:'🥈',c1:'#eaeaea',c2:'#9c9c9c',next:50};
  if(n>=10) return {name:'Bronze',emoji:'🥉',c1:'#e8b98a',c2:'#a9682f',next:25};
  return {name:'Reader',emoji:'🌱',c1:'#c8f2d1',c2:'#4fae77',next:10};
}

/* ================= scanner: borrow/return ================= */
function startScanner(){
  const readerEl = document.getElementById('reader');
  if(!readerEl || html5QrCode) return;
  html5QrCode = new Html5Qrcode('reader');
  html5QrCode.start({facingMode:'environment'},{fps:10,qrbox:220}, onScanSuccess, ()=>{})
    .catch(()=>{ document.getElementById('scan-hint').textContent='Camera unavailable — use "Type the code instead" below'; html5QrCode=null; });
}
function stopScanner(){ if(html5QrCode){ html5QrCode.stop().then(()=>{html5QrCode.clear();html5QrCode=null;}).catch(()=>{html5QrCode=null;}); } }
function onScanSuccess(decodedText){
  const now = Date.now();
  if(decodedText===lastScan.text && now-lastScan.time<2000) return;
  lastScan = {text:decodedText, time:now};
  processCode(decodedText.trim());
}

document.getElementById('manual-submit').addEventListener('click', ()=>{

async function processCode(code){
  if(scanMode==='student'){
    await refreshAll();
    const student = Object.values(students).find(s=>s.code===code);
    if(!student){ showStamp('warn', t('stampCardUnknownTitle'), t('stampCardUnknownSub')); speak('unknownCard'); return; }
    currentStudent = student; scanMode='book';
    document.getElementById('status-step').innerHTML=t('step2');
    document.getElementById('status-msg').innerHTML=t('scanMsg2');
    document.getElementById('scan-hint').innerHTML=t('scanHintBook');
    document.getElementById('cancel-scan-btn').classList.remove('hidden');
    renderStudentChip(student);
    showCardConfirm(student);
    speak('scanBook');
    return;
  }
  const book = Object.values(books).find(b=>b.code===code);
  if(!book){ showStamp('warn', t('stampBookUnknownTitle'), t('stampBookUnknownSub')); speak('unknownBook'); return; }

  const activeLoan = loans.find(l=>l.bookId===book.id && l.status==='active');
  if(!activeLoan){
    const res = await apiCall('borrow', { studentId: currentStudent.id, bookId: book.id }).catch(()=>({success:false, reason:'network'}));
    if(res.success){
      showStamp('ok', t('stampBorrowedTitle'), sub2(`${book.title} — due ${fmtDate(res.transaction.dueAt)}`, `${book.title} — 期限: ${fmtDate(res.transaction.dueAt)}`));
      burstConfetti(); speak('borrowed');
      await refreshAll(); renderStudentChip(currentStudent); renderAll();
      setTimeout(()=>{ resetScanFlow(); speak('scanAgain', true); }, 3200);
      return;
    } else if(res.reason==='already_borrowed'){
      showStamp('warn', t('stampAlreadyTitle'), sub2(`${book.title} is with ${res.borrower}`, `${book.title} は ${res.borrower} さんが借りているよ`)); speak('alreadyBorrowed');
    } else if(res.reason==='max_reached'){
      showStamp('warn', t('stampMaxTitle'), sub2(`Return a book first (max ${res.max})`, `先に本を返してね(最大${res.max}冊)`)); speak('maxReached');
    } else {
      showStamp('warn', t('stampBookUnknownTitle'), sub2('Something went wrong, try again','エラーが起きたよ、もう一度'));
    }
  } else if(activeLoan.studentId===currentStudent.id){
    const res = await apiCall('returnBook', { bookId: book.id }).catch(()=>({success:false}));
    if(res.success){
      showStamp('ok', t('stampReturnedTitle'), sub2(`Thanks, ${currentStudent.name}! +1 book read`, `${currentStudent.name}さん、ありがとう!+1冊読んだ`));
      burstConfetti(); speak('returned');
      await refreshAll(); renderStudentChip(currentStudent); renderAll();
      showInlineReview(book, currentStudent);
      return;
    } else {
      showStamp('warn', t('stampBookUnknownTitle'), sub2('Something went wrong, try again','エラーが起きたよ、もう一度'));
    }
  } else {
    showStamp('warn', t('stampAlreadyTitle'), sub2(`${book.title} is with ${activeLoan.studentName}`, `${book.title} は ${activeLoan.studentName} さんが借りているよ`)); speak('alreadyBorrowed');
  }
  await refreshAll();
  renderStudentChip(currentStudent);
  renderAll();
  setTimeout(resetScanFlow, 2800);
}

function showInlineReview(book, student){
  const zone = document.getElementById('stamp-zone');
  const widget = document.createElement('div');
  widget.innerHTML = buildStarWidgetHtml();
  zone.appendChild(widget);
  wireStarWidget(widget, async (rating, comment)=>{
    await apiCall('addReview', { bookId:book.id, bookTitle:book.title, studentId:student.id, studentName:student.name, rating, comment }).catch(()=>{});
    toast(t('reviewThanks')); speak('thanksReview');
    resetScanFlow();
  }, ()=>{ resetScanFlow(); });
  setTimeout(resetScanFlow, 15000);
}
function buildStarWidgetHtml(){
  return `<div style="text-align:center;width:100%;">
    <div class="status-msg" style="font-size:15px;">${t('reviewPrompt')}</div>
    <div class="star-row" data-stars>${[1,2,3,4,5].map(n=>`<span class="star" data-n="${n}">★</span>`).join('')}</div>
    <textarea data-comment placeholder="${tp('commentPlaceholder')}" style="width:100%;min-height:50px;border-radius:10px;border:2.5px solid var(--line);padding:8px;font-family:var(--font-body);"></textarea>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:10px;">
      <button class="btn small" data-submit>${tp('submitReviewBtn')}</button>
      <button class="btn small secondary" data-skip>${tp('skipBtn')}</button>
    </div>
  </div>`;
}
function wireStarWidget(container, onSubmit, onSkip){
  let rating = 0;
  const stars = container.querySelectorAll('.star');
  stars.forEach(s=>{
    s.addEventListener('click', ()=>{
      rating = parseInt(s.dataset.n,10);
      stars.forEach(x=> x.classList.toggle('active', parseInt(x.dataset.n,10)<=rating));
    });
  });
  container.querySelector('[data-submit]').addEventListener('click', ()=>{
    if(rating===0){ toast(tp('reviewPrompt'), true); return; }
    const comment = container.querySelector('[data-comment]').value.trim();
    onSubmit(rating, comment);
  });
  container.querySelector('[data-skip]').addEventListener('click', onSkip);
}

function renderStudentChip(student){
  const initials = student.name.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase();
  const read = booksReadCount(student.id);
  const tier = tierOf(read);
  const floor = tierFloor(read);
  const next = tier.next;
  const progress = next ? Math.round(((read-floor)/(next-floor))*3) : 3;
  document.getElementById('student-chip-area').innerHTML = `
    <div class="player-chip">
      <div class="hexbadge" style="background:linear-gradient(160deg,${tier.c1},${tier.c2});">${student.photo?`<img src="${student.photo}">`:initials}</div>
      <div style="flex:1;">
        <strong>${escapeHtml(student.name)}</strong> <span class="muted">${escapeHtml(student.grade||'')}</span>
        <div class="muted">${tier.emoji} ${tier.name} · ${read} ${t('myBooksBooksRead')}</div>
        <div class="xp-bar">${[0,1,2].map(i=>`<div class="xp-seg ${i<progress?'fill':''}"></div>`).join('')}</div>
      </div>
    </div>`;
  const activeLoans = loans.filter(l=>l.studentId===student.id && l.status==='active');
  if(activeLoans.length){
    document.getElementById('loan-mini-area').innerHTML = '<ul class="quest-list">' +
      activeLoans.map(l=>`<li><span>${escapeHtml(l.bookTitle)}</span><span class="due-tag">${isOverdue(l)?'⏰ ':''}${fmtDate(l.dueAt)}</span></li>`).join('') + '</ul>';
  } else {
    document.getElementById('loan-mini-area').innerHTML = `<p class="muted">${t('noActiveQuests')}</p>`;
  }
}
function showStamp(kind, title, sub){ document.getElementById('stamp-zone').innerHTML = `<div class="stamp ${kind}">${title}<small>${sub}</small></div>`; }
function showCardConfirm(student){
  const initials = student.name.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('stamp-zone').innerHTML = `<div class="card-confirm">
    <div class="card-confirm-avatar">${student.photo?`<img src="${student.photo}">`:initials}<span class="check-badge">✓</span></div>
    <div class="card-confirm-name">${escapeHtml(student.name)}</div>
  </div>`;
}
function burstConfetti(){
  const zone = document.getElementById('stamp-zone');
  const emojis = ['✨','⭐','🎉','🌟'];
  for(let i=0;i<10;i++){
    const s = document.createElement('span');
    s.className='confetti'; s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left=(10+Math.random()*80)+'%'; s.style.top='10px';
    s.style.animationDelay=(Math.random()*0.3)+'s';
    zone.appendChild(s); setTimeout(()=>s.remove(),1500);
  }
}

function renderSearchGrid(cat){
  const list = Object.values(books).filter(b=> cat==='All' || b.category===cat);
  const grid = document.getElementById('search-grid');
  document.getElementById('search-empty').classList.toggle('hidden', list.length>0);

    return `<div class="book-card"><div class="bt">${escapeHtml(b.title)}</div><div class="ba">${escapeHtml(b.author||'')}${b.level?' · Lv'+escapeHtml(b.level):''}</div>${avg?`<div class="review-stars">${'★'.repeat(Math.round(avg))}${'☆'.repeat(5-Math.round(avg))} (${avg.toFixed(1)})</div>`:''}${badge}</div>`;

function avgRating(bookId){
  const rs = reviews.filter(r=>r.bookId===bookId);
  if(!rs.length) return null;
  return rs.reduce((sum,r)=>sum+Number(r.rating),0)/rs.length;
}

async function onReviewScan(decodedText){
  const now = Date.now();
  if(decodedText===lastScan.text && now-lastScan.time<2000) return;
  lastScan = {text:decodedText, time:now};
  await refreshAll();
  const code = decodedText.trim();
  if(reviewStep==='student'){
    const student = Object.values(students).find(s=>s.code===code);
    if(!student){ toast(t('stampCardUnknownSub'), true); return; }
    reviewStudent = student; reviewStep='book';
    document.getElementById('review-hint').innerHTML=t('scanHintBook');
    return;
  }
  const book = Object.values(books).find(b=>b.code===code);
  if(!book){ toast(t('stampBookUnknownSub'), true); return; }
  const area = document.getElementById('review-widget-area');
  area.innerHTML = buildStarWidgetHtml();
  wireStarWidget(area, async (rating, comment)=>{
    await apiCall('addReview', { bookId:book.id, bookTitle:book.title, studentId:reviewStudent.id, studentName:reviewStudent.name, rating, comment }).catch(()=>{});

  }, resetReviewFlow);
}

document.getElementById('sd-photo-input').addEventListener('change', function(){
  const file = this.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxSize = 220;
      let w = img.width, h = img.height;
      if(w>h){ if(w>maxSize){ h*=maxSize/w; w=maxSize; } } else { if(h>maxSize){ w*=maxSize/h; h=maxSize; } }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      pendingPhotoDataUrl = canvas.toDataURL('image/jpeg', 0.72);
      document.getElementById('sd-photo-preview').src = pendingPhotoDataUrl;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

  const read = booksReadCount(s.id);
  const tier = tierOf(read);
  document.getElementById('pp-tier').textContent = `${tier.emoji} ${tier.name} Reader — ${read} books read`;
  const hist = loans.filter(l=>l.studentId===s.id).sort((a,b)=>new Date(b.borrowedAt)-new Date(a.borrowedAt));
  document.getElementById('pp-history').innerHTML = hist.map(l=>`<tr><td style="padding:6px;border-bottom:1px solid #ddd;">${escapeHtml(l.bookTitle)}</td><td style="padding:6px;border-bottom:1px solid #ddd;">${fmtDate(l.borrowedAt)}</td><td style="padding:6px;border-bottom:1px solid #ddd;">${l.returnedAt?fmtDate(l.returnedAt):'—'}</td><td style="padding:6px;border-bottom:1px solid #ddd;">${computeStatus(l)}</td></tr>`).join('');
  document.getElementById('print-profile').classList.add('show');
  setTimeout(()=>{ window.print(); document.getElementById('print-profile').classList.remove('show'); }, 250);
});

/* ================= records & reports ================= */
document.getElementById('records-search').addEventListener('input', renderRecords);
document.getElementById('records-filter').addEventListener('change', renderRecords);
function computeStatus(l){ if(l.status==='returned') return 'returned'; return isOverdue(l) ? 'overdue' : 'active'; }
function renderRecords(){
  document.getElementById('stat-books').textContent = Object.keys(books).length;
  document.getElementById('stat-students').textContent = Object.keys(students).length;
  document.getElementById('stat-out').textContent = loans.filter(l=>l.status==='active').length;
  document.getElementById('stat-overdue').textContent = loans.filter(isOverdue).length;

  const q = document.getElementById('records-search').value.toLowerCase();
  const filter = document.getElementById('records-filter').value;
  let list = [...loans].sort((a,b)=> new Date(b.borrowedAt)-new Date(a.borrowedAt));
  if(q) list = list.filter(l=>(l.studentName+l.bookTitle).toLowerCase().includes(q));
  if(filter!=='all') list = list.filter(l=>computeStatus(l)===filter);

  document.getElementById('records-empty-msg').classList.toggle('hidden', loans.length>0);
  document.getElementById('records-table-body').innerHTML = list.map(l=>{
    const st = computeStatus(l);
    const badgeClass = st==='overdue'?'overdue':st==='returned'?'returned':'out';
    const label = st==='overdue'?sub2('Overdue','期限切れ'):st==='returned'?sub2('Returned','返却済み'):sub2('Out','貸出中');
    return `<tr><td>${escapeHtml(l.studentName)}</td><td>${escapeHtml(l.bookTitle)}</td><td>${fmtDate(l.borrowedAt)}</td><td>${fmtDate(l.dueAt)}</td><td>${l.returnedAt?fmtDate(l.returnedAt):'—'}</td><td><span class="badge ${badgeClass}">${label}</span></td><td><button class="btn small secondary" onclick="deleteTransaction('${l.id}')">🗑️</button></td></tr>`;
  }).join('');

  const bookCounts = {};
  loans.forEach(l=>{ bookCounts[l.bookTitle]=(bookCounts[l.bookTitle]||0)+1; });
  const topBooks = Object.entries(bookCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('top-books-list').innerHTML = topBooks.length ? topBooks.map(([title,count])=>`<li><span>${escapeHtml(title)}</span><span>${count}×</span></li>`).join('') : `<li class="muted">${t('noHistoryMsg')}</li>`;

  const readerCounts = {};
  Object.values(students).forEach(s=> readerCounts[s.name]=booksReadCount(s.id));
  const topReaders = Object.entries(readerCounts).sort((a,b)=>b[1]-a[1]).filter(([,c])=>c>0).slice(0,5);
  document.getElementById('top-readers-list').innerHTML = topReaders.length ? topReaders.map(([name,count])=>`<li><span>${escapeHtml(name)}</span><span>${count} 📖</span></li>`).join('') : `<li class="muted">${t('noHistoryMsg')}</li>`;
}
window.deleteTransaction = async function(id){
  if(!confirm('Delete this record? This cannot be undone.')) return;
  const res = await apiCall('deleteTransaction', {id}).catch(()=>({success:false}));
  if(res.success){ toast(t('toastDeleted')); await refreshAll(); renderAll(); }
  else { toast(t('toastCantSave'), true); }
};
document.getElementById('export-csv-btn').addEventListener('click', ()=>{
  const rows = [['Player','Book','Borrowed','Due','Returned','Status']];
  loans.forEach(l=> rows.push([l.studentName,l.bookTitle,fmtDate(l.borrowedAt),fmtDate(l.dueAt),l.returnedAt?fmtDate(l.returnedAt):'',computeStatus(l)]));
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='erise-library-records.csv'; a.click();
  URL.revokeObjectURL(url);
});

/* ================= settings ================= */
document.getElementById('save-settings-btn').addEventListener('click', async ()=>{
  settings.libraryName = document.getElementById('setting-name').value.trim() || 'e-Rise Library';
  settings.loanDays = parseInt(document.getElementById('setting-days').value,10) || 14;
  settings.maxBooks = parseInt(document.getElementById('setting-max').value,10) || 2;
  settings.reminderDays = parseInt(document.getElementById('setting-reminder-days').value,10) || 2;
  settings.pin = document.getElementById('setting-pin').value.trim() || '1234';
  settings.dailyPin = document.getElementById('setting-daily-pin').value.trim() || '0000';
  const res = await apiCall('saveSettings', {settings}).catch(()=>({success:false}));
  if(res.success){ toast(t('toastSettingsSaved')); } else { toast(t('toastCantSave'), true); }
});
document.getElementById('toggle-reminders-btn').addEventListener('click', async ()=>{
  const action = settings.remindersEnabled ? 'uninstallReminders' : 'installReminders';
  const res = await apiCall(action).catch(()=>({success:false}));
  if(res.success){
    settings.remindersEnabled = !settings.remindersEnabled;
    applyI18n();
    toast(settings.remindersEnabled ? t('toastRemindersOn') : t('toastRemindersOff'));
  } else { toast(t('toastCantSave'), true); }
});

/* ================= print (books/ID cards) ================= */
document.getElementById('print-books-btn').addEventListener('click', ()=>buildPrintView('books'));
document.getElementById('print-students-btn').addEventListener('click', ()=>buildPrintView('students'));
function buildPrintView(kind){
  const grid = document.getElementById('print-grid');
  grid.innerHTML = '';
  document.getElementById('print-title').textContent = kind==='books' ? 'Book QR Labels' : 'Player ID Cards';
  const items = kind==='books' ? Object.values(books) : Object.values(students);
  if(!items.length){ toast(t('toastNothingPrint'), true); return; }
  items.forEach(item=>{
    const card = document.createElement('div'); card.className='qr-print-card';
    const qrHolder = document.createElement('div'); card.appendChild(qrHolder);
    const title = document.createElement('div'); title.className='title'; title.textContent = kind==='books'?item.title:item.name; card.appendChild(title);
    const meta = document.createElement('div'); meta.className='meta'; meta.textContent = kind==='books' ? [item.author,item.category,item.level].filter(Boolean).join(' · ') : (item.grade||''); card.appendChild(meta);
    const code = document.createElement('div'); code.className='meta'; code.textContent=item.code; card.appendChild(code);
    grid.appendChild(card);
    new QRCode(qrHolder,{text:item.code,width:110,height:110,correctLevel:QRCode.CorrectLevel.M});
  });
  document.getElementById('print-view').classList.add('show');
  setTimeout(()=>{ window.print(); document.getElementById('print-view').classList.remove('show'); }, 250);
}

/* ================= utils ================= */
function escapeHtml(str){ return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function renderAll(){ renderCatalog(); renderStudents(); renderRecords(); }
</script>
</body>
